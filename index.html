<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarGuard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script>
        var i=0;
        var txt="SonarGuard: Intelligent Radar System!";
        var speed=50;
        function typewriter(){
            if(i<txt.length){
                document.getElementById("typewriter").innerHTML+=txt.charAt(i);
                i++;
                setTimeout(typewriter,speed);
            }
            else {
                setTimeout(()=>{
i=0;
document.getElementById("typewriter").innerHTML='';
typewriter();
                },1000);
            }
        }
       typewriter(); 
    </script>
</head>
<body onload="typewriter()" background="./images/background3.png">
    <div class="main">
        <!-- Navbar starts here  -->
     <section class="navbar">
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary" style="width:100vw;display: flex; align-items: center; justify-content: center;">
        <a class="navbar-brand" href="#">SonarGuard!</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                </li>
            </ul>
    
            <!-- Add Members Button -->
            <button class="btn btn-light my-2 my-lg-0" onclick="location.href='./members.html'">Add Members</button>
        </div>
    </nav>
     </section>

    </div>

    <!-- The continer starts here  -->
<div class="container"   style="width:100vw;display: flex; align-items: center; justify-content: center; ">
    <div class="container" style="width:30vw;">
        <section class="welcome-text" style="  width:350px; height:350px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;      font-size: 3rem;color:rgb(255, 255, 255)" ><p id="typewriter"></p>
        </section>
        <section class="detection-status" style="  width:fit-content; height:fit-content; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;      font-size: 2rem;color:rgb(255, 255, 255)" ><p id="detection-status">Detection Status:</p>
          <span  class="detection-result" style="  width:fit-content; height:fit-content; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;font-weight:bold;font:1rem;color:rgb(0, 98, 8)" ><p id="detection-status">Not Detected!</span>
        </section>
        
    </div>
    <div class="container" style="width:fit-content;display: flex; flex-wrap: wrap; align-items:center;justify-content:center; "> 
        
        <div class="card" style="width: 20rem; height: 20rem;margin:0.5rem 0.5rem;">
            <img class="card-img-top" src="./images/distance.jpg" alt="Card image cap">
            <div class="card-body">
              <h5 class="card-title" style="width:fit-content;display: flex; flex-wrap: wrap; align-items:center;justify-content:center;">Distance(cm):</h5>
              <p class="card-text">null</p>
            </div>
          </div>
          <div class="card" style="width: 20rem; height: 20rem;margin:0.5rem 0.5rem;">
            <img class="card-img-top" src="./images/angle.png" alt="Card image cap">
            <div class="card-body">
              <h5 class="card-title" style="width:fit-content;display: flex; flex-wrap: wrap; align-items:center;justify-content:center;">Angle:</h5>
              <p class="card-text">null</p>
            </div>
          </div> 
          
        
    </div>
    </div>
    
  <!-- </div>     Main outer div clse which contains the form and the blogs container  -->
</body>
</html>
